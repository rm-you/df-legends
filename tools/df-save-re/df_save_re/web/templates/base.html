<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DF Legends Explorer{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand"><a href="/">DF Legends Explorer</a></div>
    {% if slug is defined %}
    <nav>
      <a href="/world/{{ slug }}">Overview</a>
      <a href="/world/{{ slug }}/chronicle">Chronicle</a>
      <a href="/world/{{ slug }}/entities">Civilizations</a>
      <a href="/world/{{ slug }}/sites">Sites</a>
      <a href="/world/{{ slug }}/figures">Figures</a>
      <a href="/world/{{ slug }}/events">Events</a>
      <a href="/world/{{ slug }}/collections">Collections</a>
      <a href="/world/{{ slug }}/eras">Eras</a>
      <a href="/world/{{ slug }}/search">Search</a>
      <a href="/world/{{ slug }}/history" class="nav-debug">Extraction</a>
    </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    DF Legends Explorer — browse extracted Dwarf Fortress world history
  </footer>
</body>
</html>
